<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Máquina de Pago</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#e5e5e5;
}

h1{
    background:#9cc58a;
    display:inline-block;
    padding:10px 20px;
}

label{
    font-weight:bold;
}

input{
    text-align:center;
    font-size:20px;
    width:120px;
    padding:5px;
}

#pagado{
    margin-top:10px;
    padding:10px;
    width:120px;
    font-size:20px;
    border:4px solid red;
    background:orange;
}

.monedas{
    margin-top:30px;
}

.moneda{
    width:80px;
    height:80px;
    border-radius:50%;
    background:gold;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin:10px;
    font-weight:bold;
    cursor:pointer;
}

.billetes{
    margin-top:20px;
}

.billete{
    width:100px;
    height:50px;
    background:#7fd37f;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin:10px;
    font-weight:bold;
    cursor:pointer;
    border:2px solid #2b7a2b;
}

#cambio{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Máquina de Pago</h1>

<br><br>

<label>Importe a pagar</label><br>
<input type="number" id="importe" step="0.01">

<br><br>

<label>Cantidad pagada</label><br>
<input type="text" id="pagado" value="0.00" readonly>

<div class="monedas">
<h2>Monedas</h2>

<div class="moneda" onclick="pagar(0.20)">0.20€</div>
<div class="moneda" onclick="pagar(0.50)">0.50€</div>
<div class="moneda" onclick="pagar(1)">1€</div>

</div>

<div class="billetes">
<h2>Billetes</h2>

<div class="billete" onclick="pagar(5)">5€</div>
<div class="billete" onclick="pagar(10)">10€</div>
<div class="billete" onclick="pagar(20)">20€</div>

</div>

<div id="cambio"></div>

<script>

let acumulado = 0;

function pagar(valor){

    acumulado += valor;

    document.getElementById("pagado").value = acumulado.toFixed(2);

    let importe = parseFloat(document.getElementById("importe").value);

    let pagado = document.getElementById("pagado");

    if(acumulado < importe){

        pagado.style.background = "orange";
        pagado.style.border = "4px solid red";
        document.getElementById("cambio").innerHTML = "";

    }else{

        pagado.style.background = "lightblue";
        pagado.style.border = "4px solid black";

        let cambio = acumulado - importe;

        document.getElementById("cambio").innerHTML =
        "Cambio: " + cambio.toFixed(2) + " €";

    }

}

</script>

</body>
</html>
